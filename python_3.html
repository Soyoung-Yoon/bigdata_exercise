<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 학습 맵</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c10;
  --surface: #0e1419;
  --card: #131920;
  --border: #1e2832;
  --text: #cdd9e5;
  --muted: #545d68;
  --green: #3fb950;
  --blue: #58a6ff;
  --orange: #f78166;
  --purple: #d2a8ff;
  --yellow: #e3b341;
  --done-bg: rgba(63,185,80,.08);
  --done-border: rgba(63,185,80,.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none; z-index: 0;
}

/* ── TOP BAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,12,16,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; gap: 16px;
  height: 56px;
}
.back-btn {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--muted);
  background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 10px;
  cursor: pointer; transition: all .2s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
}
.back-btn:hover { color: var(--text); border-color: var(--green); }
.topbar-title {
  font-family: 'Space Mono', monospace;
  font-size: 14px; font-weight: 700; color: var(--green);
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.top-progress-text {
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: var(--muted);
}
.top-progress-text span { color: var(--green); font-weight: 700; }
.top-bar-track {
  width: 120px; height: 5px;
  background: var(--border); border-radius: 99px; overflow: hidden;
}
.top-bar-fill {
  height: 100%; background: var(--green); border-radius: 99px;
  transition: width .5s ease;
}

/* ── LAYOUT ── */
.page { position: relative; z-index: 1; padding: 32px 24px 80px; max-width: 1000px; margin: 0 auto; }

/* ── SECTION ── */
.section-block { margin-bottom: 40px; }
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.section-num {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 8px; letter-spacing: 1px;
}
.section-title { font-size: 14px; font-weight: 700; color: var(--text); }
.section-pct {
  margin-left: auto;
  font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
}
.section-bar {
  height: 3px; background: var(--border); border-radius: 99px;
  overflow: hidden; margin-bottom: 14px;
}
.section-bar-fill {
  height: 100%; border-radius: 99px; transition: width .5s;
}

/* ── NODE GRID ── */
.node-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}

.topic-node {
  border-radius: 11px;
  border: 1px solid var(--border);
  background: var(--card);
  padding: 14px 16px;
  cursor: pointer;
  position: relative;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
  min-height: 80px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.topic-node::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--node-color, var(--border));
  opacity: 0; transition: opacity .2s;
}
.topic-node.unlocked:hover {
  transform: translateY(-2px);
  border-color: var(--node-color);
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
}
.topic-node.unlocked:hover::before { opacity: 1; }
.topic-node.done {
  background: var(--done-bg);
  border-color: var(--done-border);
}
.topic-node.done::before { opacity: 1; background: var(--green); }
.topic-node.locked {
  cursor: not-allowed; opacity: .4; filter: grayscale(.5);
}

.node-id {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-bottom: 6px;
}
.node-label { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.4; }
.node-status { font-size: 16px; position: absolute; top: 12px; right: 12px; }

.topic-node.done .node-label { color: var(--green); }
.topic-node.locked .node-label { color: var(--muted); }

/* pulse on first unlocked */
@keyframes pulse-border {
  0%,100% { box-shadow: 0 0 0 0 rgba(63,185,80,.4); }
  50% { box-shadow: 0 0 0 6px rgba(63,185,80,0); }
}
.topic-node.next-up {
  border-color: var(--green);
  animation: pulse-border 2s infinite;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: #0e1419;
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%; max-width: 700px;
  max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(24px) scale(.97);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
  flex-shrink: 0;
}
.modal-id {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 8px;
  margin-top: 2px; flex-shrink: 0;
}
.modal-title { font-size: 18px; font-weight: 900; color: var(--text); flex: 1; }
.modal-close {
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer; padding: 2px 6px;
  border-radius: 6px; transition: all .15s; flex-shrink: 0;
}
.modal-close:hover { background: var(--border); color: var(--text); }

/* tabs inside modal */
.modal-tabs {
  display: flex; gap: 2px; padding: 12px 24px 0;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.modal-tabs::-webkit-scrollbar { display: none; }
.m-tab {
  padding: 7px 16px; font-size: 12px; font-weight: 700;
  border-radius: 8px 8px 0 0; border: 1px solid transparent;
  cursor: pointer; background: none; color: var(--muted);
  font-family: 'Noto Sans KR', sans-serif;
  transition: all .15s;
  border-bottom: none;
}
.m-tab.active {
  background: var(--card); color: var(--green);
  border-color: var(--border); border-bottom-color: var(--card);
}

.modal-body {
  flex: 1; overflow-y: auto; padding: 20px 24px 24px;
}

/* concept panel */
.concept-section { margin-bottom: 20px; }
.concept-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 2px; color: var(--muted);
  margin-bottom: 8px;
}
.concept-text { font-size: 14px; line-height: 1.8; color: var(--text); }
.code-block {
  background: #060a0e; border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
  font-family: 'Space Mono', monospace; font-size: 12px;
  line-height: 1.8; color: var(--text); overflow-x: auto;
  white-space: pre; margin: 10px 0;
}
.c-kw { color: #ff7b72; }
.c-fn { color: #d2a8ff; }
.c-str { color: #a5d6ff; }
.c-num { color: #f2cc60; }
.c-cm { color: #545d68; font-style: italic; }
.c-cls { color: #ffa657; }
.key-point {
  background: rgba(63,185,80,.07); border-left: 3px solid var(--green);
  border-radius: 0 8px 8px 0; padding: 12px 14px;
  font-size: 13px; color: #9ecf9e; line-height: 1.7; margin: 12px 0;
}

/* quiz panel */
.quiz-score {
  display: flex; gap: 16px; margin-bottom: 16px;
  padding: 12px 16px;
  background: var(--surface); border-radius: 10px; border: 1px solid var(--border);
}
.qs-item { text-align: center; }
.qs-val { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; }
.qs-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
.qs-pct { color: var(--green); }
.qs-ok { color: var(--green); }
.qs-ng { color: var(--orange); }

.quiz-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; margin-bottom: 12px;
}
.quiz-item.q-correct { border-color: rgba(63,185,80,.4); background: rgba(63,185,80,.05); }
.quiz-item.q-wrong { border-color: rgba(247,129,102,.4); background: rgba(247,129,102,.05); }

.q-prompt { font-size: 13px; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }
.q-code { /* inline code in quiz */ font-family: 'Space Mono', monospace; }

.blank-inp {
  display: inline-block;
  background: rgba(88,166,255,.1); border: 1.5px solid var(--blue);
  border-radius: 5px; padding: 2px 8px;
  font-family: 'Space Mono', monospace; font-size: 12px; color: var(--blue);
  outline: none; vertical-align: middle;
  transition: all .2s;
}
.blank-inp:focus { background: rgba(88,166,255,.18); box-shadow: 0 0 0 2px rgba(88,166,255,.2); }
.blank-inp.ok { background: rgba(63,185,80,.15); border-color: var(--green); color: var(--green); }
.blank-inp.ng { background: rgba(247,129,102,.15); border-color: var(--orange); color: var(--orange); }

.q-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn {
  padding: 7px 16px; border-radius: 7px; border: 1px solid var(--border);
  background: var(--card); color: var(--text);
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px;
  cursor: pointer; transition: all .15s; font-weight: 600;
}
.btn:hover { border-color: var(--green); color: var(--green); }
.btn-primary { background: var(--green); color: #080c10; border-color: var(--green); }
.btn-primary:hover { background: #56d364; color: #080c10; }

.answer-box {
  display: none; margin-top: 10px;
  background: #060a0e; border-left: 3px solid var(--green);
  border-radius: 0 8px 8px 0; padding: 10px 12px;
  font-size: 12px;
}
.answer-box.show { display: block; }
.ans-label { font-size: 9px; color: var(--green); letter-spacing: 2px; font-family:'Space Mono',monospace; margin-bottom:4px; }
.ans-val { font-family: 'Space Mono', monospace; color: var(--green); font-size: 12px; }
.ans-exp { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.6; }

/* unlock banner */
.unlock-banner {
  display: none;
  background: linear-gradient(135deg, rgba(63,185,80,.15), rgba(63,185,80,.05));
  border: 1px solid rgba(63,185,80,.4); border-radius: 12px;
  padding: 16px 20px; margin-bottom: 16px;
  text-align: center;
}
.unlock-banner.show { display: block; }
.unlock-banner h3 { font-size: 16px; color: var(--green); margin-bottom: 6px; }
.unlock-banner p { font-size: 12px; color: var(--muted); }

/* pass threshold */
.threshold-note {
  font-size: 11px; color: var(--muted); text-align: center;
  margin-top: 8px; padding: 8px;
  border: 1px dashed var(--border); border-radius: 8px;
}

/* modal footer */
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; gap: 12px;
}
.completion-status { font-size: 12px; color: var(--muted); }
.completion-status.done { color: var(--green); font-weight: 700; }

/* scrollbar */
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-track { background: transparent; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* toast */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #1c2128; border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 10px 18px;
  border-radius: 10px; z-index: 9999;
  transition: transform .3s; box-shadow: 0 8px 24px rgba(0,0,0,.5);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* page fade */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
.section-block { animation: fadeUp .4s both; }
.section-block:nth-child(1){animation-delay:.05s}
.section-block:nth-child(2){animation-delay:.1s}
.section-block:nth-child(3){animation-delay:.15s}
.section-block:nth-child(4){animation-delay:.2s}
.section-block:nth-child(5){animation-delay:.25s}

@media(max-width:600px){
  .node-grid{grid-template-columns:repeat(2,1fr)}
  .modal-footer{flex-direction:column;gap:8px}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn" onclick="fadeOut(event, 'index.html')">← 로드맵</a>
  <span class="topbar-title">🐍 Python</span>
  <div class="topbar-right">
    <span class="top-progress-text"><span id="topDone">0</span>/28 완료</span>
    <div class="top-bar-track"><div class="top-bar-fill" id="topFill" style="width:0%"></div></div>
  </div>
</div>

<div class="page" id="page"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-id" id="mId"></div>
      <div class="modal-title" id="mTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="m-tab active" id="tab-concept" onclick="switchMTab('concept')">📖 개념</button>
      <button class="m-tab" id="tab-flash" onclick="switchMTab('flash')">🃏 플래시카드</button>
      <button class="m-tab" id="tab-quiz" onclick="switchMTab('quiz')">✏️ 빈칸퀴즈</button>
      <button class="m-tab" id="tab-cheat" onclick="switchMTab('cheat')">📋 치트시트</button>
      <button class="m-tab" id="tab-wrong" onclick="switchMTab('wrong')">📝 오답노트</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-footer">
      <span class="completion-status" id="mStatus">퀴즈를 풀어 잠금을 해제하세요</span>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="prevTopic()">← 이전</button>
        <button class="btn btn-primary" onclick="nextTopic()">다음 →</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  1-01 객체(Object) - Rich Learning Data
//  모든 HTML 문자열은 일반 따옴표 문자열 사용 (백틱 중첩 방지)
// ============================================================
var D101 = {};

D101.concept = [
  '<div style="margin-bottom:16px">',
  '<div style="font-size:13px;line-height:2;color:var(--text)">',
  '\uD83C\uDF0D \uC2E4 \uC138\uACC4\uC758 \uBAA8\uB4E0 \uAC1C\uB150\uC744 \uCEF4\uD4E8\uD130\uC5D0 \uBC18\uC601\uD558\uC5EC \uC800\uC7A5\uD55C \uAC83\uC744 ',
  '<strong style="color:#58a6ff">\uAC1D\uCCB4(Object)</strong>\uB77C\uACE0 \uD569\uB2C8\uB2E4.<br>',
  'Python\uC5D0\uC11C\uB294 <em>\uC22B\uC790, \uBB38\uC790\uC5F4, \uD568\uC218, \uBAA8\uB4C8</em> \uB4F1 \uBAA8\uB4E0 \uAC83\uC774 \uAC1D\uCCB4\uC785\uB2C8\uB2E4!',
  '</div></div>',
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">',
  '<div style="background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.3);border-radius:10px;padding:14px">',
  '<div style="font-size:10px;color:#58a6ff;letter-spacing:2px;margin-bottom:8px;font-family:Space Mono,monospace">TYPE (class)</div>',
  '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">\uC124\uACC4\uB3C4 \u00B7 \uD2C0 \u00B7 \uACF5\uC7A5</div>',
  '<div style="font-family:Space Mono,monospace;font-size:11px;line-height:2;color:#58a6ff">',
  'int &nbsp; float &nbsp; bool<br>str &nbsp; list &nbsp; tuple<br>set &nbsp; dict<br>function &nbsp; module',
  '</div></div>',
  '<div style="background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.3);border-radius:10px;padding:14px">',
  '<div style="font-size:10px;color:#3fb950;letter-spacing:2px;margin-bottom:8px;font-family:Space Mono,monospace">INSTANCE</div>',
  '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">\uC2E4\uC81C \uAC12 \u00B7 \uC81C\uD488 \u00B7 \uACB0\uACFC\uBB3C</div>',
  '<div style="font-family:Space Mono,monospace;font-size:11px;line-height:2;color:#3fb950">',
  '10 &nbsp; 3.14 &nbsp; True<br>\'python\' &nbsp; [1,2,3]<br>(1,2) &nbsp; {1,2}<br>{\'a\':1}',
  '</div></div></div>',
  '<div style="background:rgba(227,179,65,.07);border-left:3px solid #e3b341;border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:#e3b341;line-height:1.8">',
  '\uD83C\uDFED \uBE44\uC720: <strong>int</strong>\uB294 &quot;\uC815\uC218 \uACF5\uC7A5(\uC124\uACC4\uB3C4)&quot;, <strong>10</strong>\uC740 \uADF8 \uACF5\uC7A5\uC5D0\uC11C \uB9CC\uB4E4\uC5B4\uC9C4 &quot;\uC81C\uD488&quot;\uC785\uB2C8\uB2E4.<br>',
  '\uACF5\uC7A5(class)\uC740 \uD558\uB098\uC9C0\uB9CC, \uC81C\uD488(instance)\uC740 10, 42, -7 \uCC98\uB7FC \uBB34\uC218\uD788 \uB9CE\uC744 \uC218 \uC788\uC5B4\uC694!',
  '</div>'
].join('');

D101.code = [
  '<span class="c-cm"># [1] class(=type) \uC640 instance \uCD9C\uB825</span>\n',
  '<span class="c-fn">print</span>(<span class="c-cls">int</span>, <span class="c-num">10</span>)\n',
  '<span class="c-cm"># &lt;class \'int\'&gt;  10</span>\n\n',
  '<span class="c-cm"># [2] \uC5F0\uC0B0\uC790 \u00B7 \uD568\uC218 \u00B7 .(\uC811\uADFC \uC5F0\uC0B0\uC790) \uC138 \uAC00\uC9C0 \uBC29\uBC95</span>\n',
  '<span class="c-num">10</span> + <span class="c-num">20</span>           <span class="c-cm"># \uC5F0\uC0B0\uC790  -&gt; 30</span>\n',
  '<span class="c-fn">abs</span>(-<span class="c-num">10</span>)          <span class="c-cm"># \uD568\uC218    -&gt; 10</span>\n',
  '(-<span class="c-num">10</span>).__abs__()   <span class="c-cm"># . \uC811\uADFC  -&gt; 10</span>\n',
  '(<span class="c-num">10</span>).__add__(<span class="c-num">20</span>) <span class="c-cm"># . \uC811\uADFC  -&gt; 30</span>\n\n',
  '<span class="c-cm"># [3] \uAC1D\uCCB4 \uC815\uBCF4 \uD655\uC778 4\uCD1D\uC0AC</span>\n',
  '<span class="c-fn">print</span>(<span class="c-fn">type</span>(<span class="c-num">10</span>),   <span class="c-cm"># &lt;class \'int\'&gt;  \uD0C0\uC785 \uD655\uC778</span>\n',

      {id:'2-02',label:'Sequence \uc5f0\uc0b0',concept:'\uc2dc\ucfc0\uc2a4 \ud0c0\uc785\uc740 <strong>+</strong>(\uc5f0\uACB0), <strong>*</strong>(\uBC18\ubcf5), <strong>in</strong>(\ud3ec\ud568 \uc5ec\uBD80), <strong>len()</strong>(\uAE38\uc774) \ub4f1\uc758 \uc5f0\uc0b0\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2E4.',code:'a = [<span class="c-num">1</span>, <span class="c-num">2</span>]; b = [<span class="c-num">3</span>, <span class="c-num">4</span>]\na + b   <span class="c-cm"># [1,2,3,4]</span>\na * <span class="c-num">3</span>   <span class="c-cm"># [1,2,1,2,1,2]</span>\n<span class="c-num">2</span> <span class="c-kw">in</span> a  <span class="c-cm"># True</span>\n<span class="c-fn">len</span>(a)  <span class="c-cm"># 2</span>',keypoint:'in \uc5f0\uc0b0\uc790\ub85c \uc694\uc18c \ud3ec\ud568 \uc5ec\uBD80\ub97c \ud655\uc778\ud569\ub2c8\ub2E4.',quizzes:[{prompt:'[1,2] + [3,4]\uc758 \uACB0\uACFC\ub294? (\ub9ac\uc2a4\ud2b8 \ud615\ud0dc\ub85c)',template:[{t:'blank',a:'[1, 2, 3, 4]',h:'result',s:13}],explain:'+ \uc5f0\uc0b0\uc790\ub294 \ub450 \uc2dc\ucfc0\uc2a4\ub97c \uc5f0\uACB0\ud569\ub2c8\ub2E4.'},{prompt:'"hello" \uc5d0 "ell"\uc774 \ud3ec\ud568\ub418\ub294\uc9c0 \ud655\uc778\ud558\uc138\uc694.',template:[{t:'code',v:'print("ell" '},{t:'blank',a:'in',h:'op',s:3},{t:'code',v:' "hello")'}],explain:'in \uc5f0\uc0b0\uc790\ub85c \uc2dc\ucfc0\uc2a4 \uc548\uc5d0 \uc694\uc18c\uAC00 \ud3ec\ud568\ub418\ub294\uc9c0 \ud655\uc778\ud569\ub2c8\ub2E4.'}]},
      {id:'2-03',label:'tuple',concept:'<strong>\ud29c\ud50c(tuple)</strong>\uc740 \ubcc0\uacbd \uBD88\uAC00\ub2a5\ud55c(immutable) \uc2dc\ucfc0\uc2a4\uc785\ub2c8\ub2E4. \uc18c\uAD04\ud638 <code>()</code>\ub85c \uc0dd\uc131\ud569\ub2c8\ub2E4.',code:'t = (<span class="c-num">1</span>, <span class="c-num">2</span>, <span class="c-num">3</span>)\nt = (<span class="c-num">1</span>,)        <span class="c-cm"># \uc694\uc18c 1\uAC1C - \uc27C\ud45c \ud544\uc218!</span>\na, b, c = t  <span class="c-cm"># \uc5B8\ud301\ud0b9</span>',keypoint:'\uc694\uc18c\uAC00 1\uAC1C\uc778 \ud29c\ud50c\uc740 \uBC18\ub4dc\uc2dc \ub4A4\uc5d0 \uc27C\ud45c\ub97c \uBD99\uc5ec\uc57c \ud569\ub2c8\ub2E4: (1,).',quizzes:[{prompt:'\ud29c\ud50c\uc744 \uc0dd\uc131\ud558\ub294 \uAD04\ud638\ub294?',template:[{t:'blank',a:'()',h:'bracket',s:3}],explain:'\ud29c\ud50c\uc740 \uc18c\uAD04\ud638 ()\ub85c \uc0dd\uc131\ud569\ub2c8\ub2E4.'},{prompt:'\uc694\uc18c\uAC00 \ud558\ub098\uc778 \ud29c\ud50c: t = (5   )  \ube48\uce78\uc5d0 \ub4e4\uc5b4\uAC08 \uAC83\uc740?',template:[{t:'blank',a:',',h:'symbol',s:2}],explain:"(5,)\uCC98\ub7fc \uBC18\ub4dc\uc2dc \uc27C\ud45c\ub97c \uBD99\uc5ec\uc57c \ud569\ub2c8\ub2E4. (5)\ub294 \uc815\uc218 5\uc640 \uAC19\uc2b5\ub2c8\ub2E4."}]},
      {id:'2-04',label:'list',concept:'<strong>\ub9ac\uc2a4\ud2b8(list)</strong>\ub294 \ubcc0\uacbd \uAC00\ub2a5\ud55c(mutable) \uc2dc\ucfc0\uc2a4\uc785\ub2c8\ub2E4. \ub300\uAD04\ud638 <code>[]</code>\ub85c \uc0dd\uc131\ud569\ub2c8\ub2E4.',code:"lst = [<span class='c-num'>1</span>, <span class='c-str'>'hello'</span>, <span class='c-num'>3.14</span>]  <span class='c-cm'># \ud63c\ud569 \ud0c0\uc785</span>\nlst[<span class='c-num'>0</span>] = <span class='c-num'>99</span>   <span class='c-cm'># \ubcc0\uacbd \uAC00\ub2a5!</span>\n<span class='c-fn'>list</span>(<span class='c-str'>'abc'</span>)     <span class='c-cm'># ['a','b','c']</span>",keypoint:'\ub9ac\uc2a4\ud2b8\ub294 mutable(\ubcc0\uacbd \uAC00\ub2a5)\ud558\uACE0, \ud29c\ud50c\uc740 immutable(\ubcc0\uacbd \uBD88\uAC00)\ud569\ub2c8\ub2E4.',quizzes:[{prompt:'\ub9ac\uc2a4\ud2b8\ub97c \uc0dd\uc131\ud558\ub294 \uAD04\ud638\ub294?',template:[{t:'blank',a:'[]',h:'bracket',s:3}],explain:'\ub9ac\uc2a4\ud2b8\ub294 \ub300\uAD04\ud638 []\ub85c \uc0dd\uc131\ud569\ub2c8\ub2E4.'},{prompt:"'abc' \uBB38\uc790\uc5f4\uc744 \ub9ac\uc2a4\ud2b8\ub85c \ubcc0\ud658\ud558\uba74?",template:[{t:'blank',a:'list',h:'fn',s:5},{t:'code',v:"('abc')"}],explain:"list('abc')\ub294 ['a', 'b', 'c']\ub97c \ub098\ud0c4\ud569\ub2c8\ub2E4."}]},
      {id:'2-05',label:'list \uba54\uc11c\ub4dc',concept:'\ub9ac\uc2a4\ud2b8\uc758 \uc8fc\uc694 \uba54\uc11c\ub4dc: <code>append()</code>, <code>insert()</code>, <code>remove()</code>, <code>pop()</code>, <code>sort()</code>, <code>count()</code>',code:"lst = [<span class='c-num'>3</span>,<span class='c-num'>1</span>,<span class='c-num'>4</span>]\nlst.<span class='c-fn'>append</span>(<span class='c-num'>9</span>)    <span class='c-cm'># [3,1,4,9]</span>\nlst.<span class='c-fn'>sort</span>()      <span class='c-cm'># [1,3,4,9]</span>\nlst.<span class='c-fn'>pop</span>()       <span class='c-cm'># 9 \uc81c\uac70 \uBC18\ud658</span>\nlst.<span class='c-fn'>count</span>(<span class='c-num'>1</span>)   <span class='c-cm'># 1\uc758 \uac1c\uc218</span>",keypoint:'append()\ub294 \ub05d\uc5d0 \ucd94\uac00, pop()\uc740 \ub9c8\uc9c0\ub9c9 \uc81c\uac70 \uBC18\ud658\uc785\ub2c8\ub2E4.',quizzes:[{prompt:'lst=[1,2,3] \uc5d0 \ub05d\uc5d0 4\ub97c \ucd94\uac00\ud558\uc138\uc694.',template:[{t:'code',v:'lst.'},{t:'blank',a:'append',h:'method',s:7},{t:'code',v:'(4)'}],explain:'append()\ub294 \ub9ac\uc2a4\ud2b8\uc758 \ub05d\uc5d0 \uc694\uc18c\ub97c \ucd94\uac00\ud569\ub2c8\ub2E4.'},{prompt:'lst=[3,1,4] \ub97c \uc624\ub984\uCC28\uc21c\uc73c\ub85c \uc815\ub82c\ud558\uc138\uc694.',template:[{t:'code',v:'lst.'},{t:'blank',a:'sort',h:'method',s:5},{t:'code',v:'()'}],explain:'sort()\ub294 \uc6d0\ubcf8 \ub9ac\uc2a4\ud2b8\ub97c \uc624\ub984\uCC28\uc21c\uc73c\ub85c \uc815\ub82c\ud569\ub2c8\ub2E4.'}]},
      {id:'2-06',label:'str \uba54\uc11c\ub4dc',concept:'\uBB38\uc790\uc5f4\uc758 \uc8fc\uc694 \uba54\uc11c\ub4dc: <code>upper()</code>, <code>strip()</code>, <code>split()</code>, <code>join()</code>, <code>replace()</code>',code:"s = <span class='c-str'>'  Hello  '</span>\ns.<span class='c-fn'>upper</span>()          <span class='c-cm'># '  HELLO  '</span>\ns.<span class='c-fn'>strip</span>()          <span class='c-cm'># 'Hello'</span>\ns.<span class='c-fn'>split</span>(<span class='c-str'>','</span>)     <span class='c-cm'># \uc27c\ud45c\ub85c \uBD84\ud560</span>\n<span class='c-str'>'-'</span>.<span class='c-fn'>join</span>([<span class='c-str'>'a'</span>,<span class='c-str'>'b'</span>])  <span class='c-cm'># 'a-b'</span>",keypoint:'split()\uc740 \uBB38\uc790\uc5f4 \u2192 \ub9ac\uc2a4\ud2b8, join()\uc740 \ub9ac\uc2a4\ud2b8 \u2192 \uBB38\uc790\uc5f4\ub85c \ubcc0\ud658\ud569\ub2c8\ub2E4.',quizzes:[{prompt:'"  hello  " \uc591\ucabd \uACF5\uBC31\uc744 \uc81c\uac70\ud558\uc138\uc694.',template:[{t:'code',v:'s = "  hello  "\ns.'},{t:'blank',a:'strip',h:'method',s:6},{t:'code',v:'()'}],explain:'strip()\uc740 \uc591\ucabd \uACF5\uBC31\uc744 \uc81c\uac70\ud569\ub2c8\ub2E4.'},{prompt:"['x','y','z']\ub97c '-'\ub85c \uc5f0\uACB0\ud558\uc138\uc694.",template:[{t:'code',v:"'-'."},{t:'blank',a:'join',h:'method',s:5},{t:'code',v:"(['x','y','z'])"}],explain:"join()\uc740 \uAD6C\uBD84\uc790.join(\ub9ac\uc2a4\ud2b8) \ud615\ud0dc\ub85c \ub9ac\uc2a4\ud2b8 \uc694\uc18c\ub97c \uc774\uc5b4\uBD99\uc785\ub2c8\ub2E4."}]},
      {id:'2-07',label:'set',concept:'<strong>set</strong>\uc740 <strong>\uc911\ubcf5 \uc5c6\ub294</strong>, <strong>\uc21c\uc11c \uc5c6\ub294</strong> \uc790\ub8cc\ud615\uc785\ub2c8\ub2E4. \uc9d1\ud569 \uc5f0\uc0b0(\uAD50 &, \ud569 |, \uCC28 -)\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2E4.',code:"s = {<span class='c-num'>1</span>,<span class='c-num'>2</span>,<span class='c-num'>3</span>,<span class='c-num'>2</span>,<span class='c-num'>1</span>}  <span class='c-cm'># {1,2,3}</span>\na = {<span class='c-num'>1</span>,<span class='c-num'>2</span>,<span class='c-num'>3</span>}; b = {<span class='c-num'>2</span>,<span class='c-num'>3</span>,<span class='c-num'>4</span>}\na & b  <span class='c-cm'># {2,3}  \uAD50\uc9d1\ud569</span>\na | b  <span class='c-cm'># {1,2,3,4} \ud569\uc9d1\ud569</span>\na - b  <span class='c-cm'># {1}  \uCC28\uc9d1\ud569</span>",keypoint:'\ube48 set\uc740 set()\ub85c \ub9CC\ub4e6\ub2c8\ub2E4. {}\ub294 \ube48 \ub515\uc154\ub108\ub9ac\uc785\ub2c8\ub2E4!',quizzes:[{prompt:'[1,2,2,3,3]\uc5d0\uc11c \uc911\ubcf5\uc744 \uc81c\uac70\ud558\ub824\uba74?',template:[{t:'blank',a:'set',h:'fn',s:4},{t:'code',v:'([1,2,2,3,3])'}],explain:'set()\uc73c\ub85c \ubcc0\ud658\ud558\uba74 \uc911\ubcf5\uc774 \uc81c\uac70\ub429\ub2c8\ub2E4.'},{prompt:'\uAD50\uc9d1\ud569 \uc5f0\uc0b0\uc790\ub294?',template:[{t:'blank',a:'&',h:'op',s:2}],explain:'& \ub294 \uAD50\uc9d1\ud569, | \ub294 \ud569\uc9d1\ud569, - \ub294 \uCC28\uc9d1\ud569\uc785\ub2c8\ub2E4.'}]},
      {id:'2-08',label:'dict \uc0dd\uc131',concept:'<strong>\ub515\uc154\ub108\ub9ac(dict)</strong>\ub294 \ud0a4-\uAC12(key:value) \uc30d\uc73c\ub85c \ub370\uc774\ud130\ub97c \uc800\uc7a5\ud569\ub2c8\ub2E4.',code:"d = {<span class='c-str'>'name'</span>: <span class='c-str'>'Alice'</span>, <span class='c-str'>'age'</span>: <span class='c-num'>25</span>}\nd[<span class='c-str'>'name'</span>]           <span class='c-cm'># 'Alice'</span>\nd.<span class='c-fn'>get</span>(<span class='c-str'>'score'</span>, <span class='c-num'>0</span>)  <span class='c-cm'># 0 (\ud0a4 \uc5c6\uc73c\uba74 \uAE30\ubcf8\uAC12)</span>",keypoint:"d['key']\ub294 \ud0a4\uAC00 \uc5c6\uc73c\uba74 KeyError. d.get('key', \uAE30\ubcf8\uAC12)\uc740 \ud0a4\uAC00 \uc5c6\uc5b4\ub3c4 \uAE30\ubcf8\uAC12\uc744 \ub098\ud0c4\ud569\ub2c8\ub2E4.",quizzes:[{prompt:"d={'a':1,'b':2} \uc5d0\uc11c 'a' \uAC12\uc744 \uac00\uc838\uc624\uc138\uc694.",template:[{t:'code',v:'d['},{t:'blank',a:"'a'",h:'key',s:4},{t:'code',v:']'}],explain:"\ub515\uc154\ub108\ub9ac\ub294 d[\ud0a4]\ub85c \uAC12\uc5d0 \uc811\uADFC\ud569\ub2c8\ub2E4."},{prompt:'\ud0a4\uAC00 \uc5c6\uc744 \ub54c \uAE30\ubcf8\uAC12 0\uc744 \ub098\ud0c4\ud558\ub294 \uba54\uc11c\ub4dc\ub294?',template:[{t:'code',v:'d.'},{t:'blank',a:'get',h:'method',s:4},{t:'code',v:"('없는키', 0)"}],explain:"get(key, default)\ub294 \ud0a4\uAC00 \uc5c6\uc744 \ub54c \uAE30\ubcf8\uAC12\uc744 \ub098\ud0c4\ud569\ub2c8\ub2E4."}]},
      {id:'2-09',label:'dict \uc5f0\uc0b0',concept:'\ub515\uc154\ub108\ub9ac \uc21c\ud658, \uc5c5\ub370\uc774\ud2b8, \uc0ad\uc81c \uBC29\uBC95\uc744 \ud559\uc2b5\ud569\ub2c8\ub2E4.',code:"d = {<span class='c-str'>'x'</span>:<span class='c-num'>1</span>, <span class='c-str'>'y'</span>:<span class='c-num'>2</span>}\n<span class='c-kw'>for</span> k, v <span class='c-kw'>in</span> d.<span class='c-fn'>items</span>():\n    <span class='c-fn'>print</span>(k, v)\nd.<span class='c-fn'>update</span>({<span class='c-str'>'z'</span>:<span class='c-num'>3</span>})\n<span class='c-kw'>del</span> d[<span class='c-str'>'x'</span>]",keypoint:'items()\ub85c \ud0a4-\uAC12 \uc30d\uc744 \ub3d9\uc2dc\uc5d0 \uc21c\ud658\ud569\ub2c8\ub2E4.',quizzes:[{prompt:'\ub515\uc154\ub108\ub9ac\ub97c \ud0a4-\uAC12 \uc30d\uc73c\ub85c \uc21c\ud658\ud560 \ub54c \uc0ac\uc6a9\ud558\ub294 \uba54\uc11c\ub4dc\ub294?',template:[{t:'code',v:'for k, v in d.'},{t:'blank',a:'items',h:'method',s:6},{t:'code',v:'():'}],explain:'items()\ub294 (key, value) \ud29c\ud50c \uc30d\uc744 \ub098\ud0c4\ud569\ub2c8\ub2E4.'},{prompt:"\ub515\uc154\ub108\ub9ac\uc5d0\uc11c 'x' \ud0a4\ub97c \uc0ad\uc81c\ud558\ub294 \ud0a4\uc6cc\ub4dc \uBC29\uBC95\uc740?",template:[{t:'blank',a:'del',h:'keyword',s:4},{t:'code',v:" d['x']"}],explain:"del d['key']\ub85c \ud0a4-\uAC12 \uc30d\uc744 \uc0ad\uc81c\ud569\ub2c8\ub2E4."}]},
      {id:'2-10',label:'Comprehension',concept:'<strong>\ucf64\ud504\ub9ac\ud5e8\uc158</strong>\uc740 \ud55c \uc904\ub85c \ub9ac\uc2a4\ud2b8, \ub515\uc154\ub108\ub9ac, set\uc744 \uc0dd\uc131\ud558\ub294 Python\ub2e4\uc6b4 \uBC29\uBC95\uc785\ub2c8\ub2E4.',code:"squares = [x**<span class='c-num'>2</span> <span class='c-kw'>for</span> x <span class='c-kw'>in</span> <span class='c-fn'>range</span>(<span class='c-num'>5</span>)]  <span class='c-cm'># [0,1,4,9,16]</span>\nevens = [x <span class='c-kw'>for</span> x <span class='c-kw'>in</span> <span class='c-fn'>range</span>(<span class='c-num'>10</span>) <span class='c-kw'>if</span> x%<span class='c-num'>2</span>==<span class='c-num'>0</span>]\nd = {k: k**<span class='c-num'>2</span> <span class='c-kw'>for</span> k <span class='c-kw'>in</span> <span class='c-fn'>range</span>(<span class='c-num'>4</span>)}",keypoint:'\ud615\uc2dd: [\ud45c\ud604\uc2dd for \ubcc0\uc218 in \uc774\ud130\ub7ec\ube14 if \uc870\uAC71]. \uc870\uAC71\uc740 \uc120\ud0dd\uc0ac\ud56d\uc785\ub2c8\ub2E4.',quizzes:[{prompt:'1~5 \uac01\uAC01\uc758 \uc81c\uACF1\uc744 \ub2f4\uc740 \ub9ac\uc2a4\ud2b8\ub97c \ud55c \uc904\ub85c \ub9CC\ub4e6\ub2c8\ub2E4.',template:[{t:'blank',a:'[x**2 for x in range(1,6)]',h:'comprehension',s:27}],explain:'[x**2 for x in range(1,6)]\ub294 [1,4,9,16,25]\ub97c \uc0dd\uc131\ud569\ub2c8\ub2E4.'},{prompt:'0~9 \uc911 \uc9DD\uc218\ub9cc \uACE8\ub77c\ub0b4\ub294 \ucf64\ud504\ub9ac\ud5e8\uc158 \uc870\uAC71\uc740?',template:[{t:'code',v:'[x for x in range(10) '},{t:'blank',a:'if x % 2 == 0',h:'condition',s:15},{t:'code',v:']'}],explain:'if x % 2 == 0 \uc870\uAC71\uc73c\ub85c \uc9DD\uc218\ub9cc \ud544\ud130\ub9c1\ud569\ub2c8\ub2E4.'}]}

const ALL_TOPICS = SECTIONS.flatMap(s => s.topics);
const TOTAL = ALL_TOPICS.length;

// ============================================================
//  STATE
// ============================================================
function getState() {
  const raw = localStorage.getItem('python_progress');
  return raw ? JSON.parse(raw) : {};
}
function setState(st) {
  localStorage.setItem('python_progress', JSON.stringify(st));
  const done = Object.values(st).filter(Boolean).length;
  localStorage.setItem('progress_python', JSON.stringify({completed:done, total:TOTAL}));
}
function isTopicUnlocked(idx) {
  if (idx === 0) return true;
  return !!getState()[ALL_TOPICS[idx-1].id];
}
function isTopicDone(id) { return !!getState()[id]; }

// ============================================================
//  RENDER MAP
// ============================================================
function renderMap() {
  const page = document.getElementById('page');
  page.innerHTML = '';
  const st = getState();
  const done = Object.values(st).filter(Boolean).length;
  document.getElementById('topDone').textContent = done;
  document.getElementById('topFill').style.width = Math.round(done/TOTAL*100) + '%';

  let gi = 0;
  SECTIONS.forEach(sec => {
    const secDone = sec.topics.filter(t => !!st[t.id]).length;
    const secPct = Math.round(secDone/sec.topics.length*100);
    const block = document.createElement('div');
    block.className = 'section-block';
    block.innerHTML =
      '<div class="section-header">' +
        '<span class="section-num">' + sec.num + '</span>' +
        '<span class="section-title">' + sec.title + '</span>' +
        '<span class="section-pct">' + secDone + '/' + sec.topics.length + '</span>' +
      '</div>' +
      '<div class="section-bar"><div class="section-bar-fill" style="width:' + secPct + '%;background:' + sec.color + '"></div></div>' +
      '<div class="node-grid" id="grid-' + sec.num.replace(' ','') + '"></div>';
    page.appendChild(block);

    const grid = block.querySelector('.node-grid');
    sec.topics.forEach(function(topic) {
      const idx = gi;
      const unlocked = isTopicUnlocked(idx);
      const d = isTopicDone(topic.id);
      const isNext = unlocked && !d && (idx === 0 || isTopicDone(ALL_TOPICS[idx-1].id));
      const node = document.createElement('div');
      node.className = 'topic-node ' + (d ? 'done' : unlocked ? 'unlocked' : 'locked');
      if (isNext) node.classList.add('next-up');
      node.style.setProperty('--node-color', sec.color);
      node.innerHTML =
        '<div><div class="node-id">' + topic.id + '</div><div class="node-label">' + topic.label + '</div></div>' +
        '<div class="node-status">' + (d ? '✅' : unlocked ? '' : '🔒') + '</div>';
      if (unlocked) {
        node.addEventListener('click', (function(t, c, i){ return function(){ openModal(t,c,i); }; })(topic, sec.color, idx));
      } else {
        node.addEventListener('click', function(){ showToast('🔒 이전 항목을 먼저 완료하세요'); });
      }
      grid.appendChild(node);
      gi++;
    });
  });
}

// ============================================================
//  MODAL
// ============================================================
var currentTopicIdx = 0;
var quizScores = {};
var wrongNotes = {};
var fcIdx = {};
var fcScore = {};
var activeTab = 'concept';

function openModal(topic, color, idx) {
  currentTopicIdx = idx;
  activeTab = 'concept';
  renderModalContent(topic, color);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  renderMap();
}
function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function switchMTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.m-tab').forEach(function(b){ b.classList.remove('active'); });
  var el = document.getElementById('tab-' + tab);
  if (el) el.classList.add('active');
  var topic = ALL_TOPICS[currentTopicIdx];
  var sec = SECTIONS.find(function(s){ return s.topics.includes(topic); });
  renderModalBody(topic, sec.color);
}

function renderModalContent(topic, color) {
  document.getElementById('mId').textContent = topic.id;
  document.getElementById('mTitle').textContent = topic.label;
  var hasFlash = !!(topic.flashcards && topic.flashcards.length);
  var hasCheat = !!(topic.cheatsheet && topic.cheatsheet.length);
  document.getElementById('tab-flash').style.display = hasFlash ? '' : 'none';
  document.getElementById('tab-cheat').style.display = hasCheat ? '' : 'none';
  ['concept','flash','quiz','cheat','wrong'].forEach(function(t){
    var e = document.getElementById('tab-' + t); if(e) e.classList.remove('active');
  });
  document.getElementById('tab-concept').classList.add('active');
  activeTab = 'concept';
  var done = isTopicDone(topic.id);
  var st = document.getElementById('mStatus');
  st.textContent = done ? '✅ 완료! 다음 항목으로 이동하세요' : '퀴즈 70% 이상 정답 시 완료 처리됩니다';
  st.className = 'completion-status' + (done ? ' done' : '');
  renderModalBody(topic, color);
}

function renderModalBody(topic, color) {
  var body = document.getElementById('mBody');
  if (activeTab === 'concept') {
    body.innerHTML =
      '<div class="concept-section"><div class="concept-label">CONCEPT</div><div class="concept-text">' + topic.concept + '</div></div>' +
      '<div class="concept-section"><div class="concept-label">CODE EXAMPLE</div><div class="code-block">' + topic.code + '</div></div>' +
      '<div class="concept-section"><div class="key-point">💡 핵심 포인트: ' + topic.keypoint + '</div></div>';
  } else if (activeTab === 'flash') {
    renderFlashPanel(topic, color);
  } else if (activeTab === 'cheat') {
    renderCheatPanel(topic);
  } else if (activeTab === 'wrong') {
    renderWrongPanel(topic);
  } else {
    renderQuizPanel(topic, color);
  }
}

// ============================================================
//  FLASHCARD
// ============================================================
function renderFlashPanel(topic, color) {
  if (!topic.flashcards || !topic.flashcards.length) {
    document.getElementById('mBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">플래시카드가 없습니다.</div>';
    return;
  }
  if (fcIdx[topic.id] === undefined) fcIdx[topic.id] = 0;
  if (!fcScore[topic.id]) fcScore[topic.id] = {known:0, unknown:0};
  var cards = topic.flashcards;
  var ci = fcIdx[topic.id];
  var card = cards[ci];
  var sc = fcScore[topic.id];
  var dots = cards.map(function(_,i){
    return '<div style="width:8px;height:8px;border-radius:50%;background:' + (i===ci ? color : 'var(--border)') + ';transition:background .3s;cursor:pointer" onclick="fcJump(\'' + topic.id + '\',' + i + ')"></div>';
  }).join('');

  document.getElementById('mBody').innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
      '<div style="font-family:Space Mono,monospace;font-size:11px;color:var(--muted)">' + (ci+1) + ' / ' + cards.length + '</div>' +
      '<div style="display:flex;gap:8px;align-items:center">' +
        '<span style="font-size:11px;color:#3fb950;font-family:Space Mono,monospace">✅ ' + sc.known + '</span>' +
        '<span style="font-size:11px;color:#f78166;font-family:Space Mono,monospace">❌ ' + sc.unknown + '</span>' +
        '<button class="btn" style="font-size:11px;padding:4px 10px;color:#58a6ff;border-color:rgba(88,166,255,.3)" onclick="shuffleFlash(\'' + topic.id + '\')">🔀 셔플</button>' +
      '</div>' +
    '</div>' +
    '<div style="width:100%;height:6px;background:var(--border);border-radius:99px;margin-bottom:16px;overflow:hidden">' +
      '<div style="height:100%;width:' + Math.round(ci/cards.length*100) + '%;background:' + color + ';border-radius:99px;transition:width .4s"></div>' +
    '</div>' +
    '<div id="fc-card" onclick="flipFlash(\'' + topic.id + '\')" style="background:var(--surface);border:1px solid ' + color + '40;border-radius:16px;padding:28px 24px;min-height:190px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:14px;position:relative;transition:all .3s;user-select:none;">' +
      '<div style="position:absolute;top:12px;left:14px;font-size:9px;font-family:Space Mono,monospace;color:' + color + ';background:' + color + '20;padding:3px 8px;border-radius:4px;letter-spacing:1px">' + card.category + '</div>' +
      '<div id="fc-front" style="font-size:15px;font-weight:700;line-height:1.7;color:var(--text)">' + card.front + '</div>' +
      '<div id="fc-back" style="display:none;font-size:13px;line-height:1.9;color:var(--text)">' + card.back + '</div>' +
      '<div id="fc-hint" style="font-size:11px;color:var(--muted);position:absolute;bottom:12px">👆 클릭하여 뒤집기</div>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px">' +
      '<button class="btn" onclick="fcNav(\'' + topic.id + '\',-1)">← 이전</button>' +
      '<div style="display:flex;gap:10px">' +
        '<button class="btn" style="color:#f78166;border-color:rgba(247,129,102,.3);background:rgba(247,129,102,.08)" onclick="fcMark(\'' + topic.id + '\',\'unknown\')">❌ 모르겠어</button>' +
        '<button class="btn" style="color:#3fb950;border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.08)" onclick="fcMark(\'' + topic.id + '\',\'known\')">✅ 알겠어!</button>' +
      '</div>' +
      '<button class="btn" onclick="fcNav(\'' + topic.id + '\',1)">다음 →</button>' +
    '</div>' +
    '<div style="display:flex;justify-content:center;gap:6px;margin-top:14px;flex-wrap:wrap">' + dots + '</div>';
}

function flipFlash(tid) {
  var front = document.getElementById('fc-front');
  var back = document.getElementById('fc-back');
  var hint = document.getElementById('fc-hint');
  var card = document.getElementById('fc-card');
  if (!front) return;
  var showing = front.style.display !== 'none';
  if (showing) {
    front.style.display = 'none'; back.style.display = 'block';
    hint.textContent = '👆 다시 클릭하면 앞면으로';
    card.style.background = 'rgba(63,185,80,.06)'; card.style.borderColor = '#3fb95060';
  } else {
    front.style.display = 'block'; back.style.display = 'none';
    hint.textContent = '👆 클릭하여 뒤집기';
    card.style.background = 'var(--surface)'; card.style.borderColor = '';
  }
}

function fcNav(tid, dir) {
  var topic = ALL_TOPICS.find(function(t){ return t.id === tid; });
  if (!topic || !topic.flashcards) return;
  fcIdx[tid] = (fcIdx[tid] + dir + topic.flashcards.length) % topic.flashcards.length;
  var sec = SECTIONS.find(function(s){ return s.topics.includes(topic); });
  renderFlashPanel(topic, sec.color);
}

function fcJump(tid, i) {
  var topic = ALL_TOPICS.find(function(t){ return t.id === tid; });
  if (!topic) return;
  fcIdx[tid] = i;
  var sec = SECTIONS.find(function(s){ return s.topics.includes(topic); });
  renderFlashPanel(topic, sec.color);
}

function fcMark(tid, result) {
  if (!fcScore[tid]) fcScore[tid] = {known:0, unknown:0};
  fcScore[tid][result]++;
  fcNav(tid, 1);
}

function shuffleFlash(tid) {
  var topic = ALL_TOPICS.find(function(t){ return t.id === tid; });
  if (!topic || !topic.flashcards) return;
  for (var i = topic.flashcards.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = topic.flashcards[i]; topic.flashcards[i] = topic.flashcards[j]; topic.flashcards[j] = tmp;
  }
  fcIdx[tid] = 0;
  var sec = SECTIONS.find(function(s){ return s.topics.includes(topic); });
  renderFlashPanel(topic, sec.color);
  showToast('🔀 카드 순서를 섞었습니다!');
}

// ============================================================
//  CHEATSHEET
// ============================================================
function renderCheatPanel(topic) {
  if (!topic.cheatsheet) {
    document.getElementById('mBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">치트시트가 없습니다.</div>';
    return;
  }
  var html = '<div style="margin-bottom:12px;font-size:10px;color:var(--muted);font-family:Space Mono,monospace;letter-spacing:2px">QUICK REFERENCE</div><div style="display:grid;gap:8px">';
  topic.cheatsheet.forEach(function(row) {
    html += '<div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid ' + row.color + ';border-radius:0 10px 10px 0;padding:12px 14px;display:grid;grid-template-columns:170px 1fr;gap:12px;align-items:start">' +
      '<div><div style="font-family:Space Mono,monospace;font-size:12px;color:' + row.color + ';font-weight:700">' + row.func + '</div>' +
      '<div style="font-size:10px;color:var(--muted);margin-top:3px">&rarr; ' + row.ret + '</div></div>' +
      '<div><div style="font-size:12px;color:var(--text);margin-bottom:4px">' + row.desc + '</div>' +
      '<div style="font-family:Space Mono,monospace;font-size:11px;color:var(--muted);background:var(--card);padding:4px 8px;border-radius:4px;display:inline-block">' + row.ex + '</div></div>' +
      '</div>';
  });
  html += '</div>';
  document.getElementById('mBody').innerHTML = html;
}

// ============================================================
//  WRONG NOTE
// ============================================================
function renderWrongPanel(topic) {
  var notes = wrongNotes[topic.id] || {};
  var keys = Object.keys(notes);
  if (!keys.length) {
    document.getElementById('mBody').innerHTML =
      '<div style="text-align:center;padding:48px 20px;color:var(--muted)">' +
      '<div style="font-size:36px;margin-bottom:12px">🎉</div>' +
      '<div style="font-size:14px">오답 기록이 없습니다!</div>' +
      '<div style="font-size:12px;margin-top:6px">빈칸 퀴즈를 풀면 틀린 항목이 여기 모입니다.</div></div>';
    return;
  }
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
    '<div style="font-size:10px;color:var(--muted);font-family:Space Mono,monospace;letter-spacing:2px">WRONG NOTE — ' + keys.length + '개</div>' +
    '<button class="btn" style="font-size:11px;padding:4px 10px;color:#f78166;border-color:rgba(247,129,102,.3)" onclick="clearWrongTopic(\'' + topic.id + '\')">초기화</button>' +
    '</div><div style="display:grid;gap:8px">';
  keys.sort(function(a,b){ return notes[b].count - notes[a].count; }).forEach(function(k){
    var n = notes[k];
    html += '<div style="background:var(--card);border:1px solid rgba(247,129,102,.3);border-left:3px solid #f78166;border-radius:0 10px 10px 0;padding:12px 14px">' +
      '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">' + esc(n.q) + '</div>' +
      '<div style="font-size:10px;color:#f78166;margin-bottom:2px;font-family:Space Mono,monospace">내 답</div>' +
      '<div style="font-family:Space Mono,monospace;font-size:12px;color:#f78166;margin-bottom:6px">' + esc(n.your||'(공백)') + '</div>' +
      '<div style="font-size:10px;color:#3fb950;margin-bottom:2px;font-family:Space Mono,monospace">정답</div>' +
      '<div style="font-family:Space Mono,monospace;font-size:12px;color:#3fb950">' + esc(n.correct) + '</div>' +
      '<div style="font-size:10px;color:var(--muted);margin-top:8px">틀린 횟수: ' + n.count + '회</div></div>';
  });
  html += '</div>';
  document.getElementById('mBody').innerHTML = html;
}

function clearWrongTopic(tid) {
  if (wrongNotes[tid]) delete wrongNotes[tid];
  var topic = ALL_TOPICS.find(function(t){ return t.id === tid; });
  renderWrongPanel(topic);
  showToast('오답 노트를 초기화했습니다.');
}

// ============================================================
//  QUIZ PANEL
// ============================================================
function renderQuizPanel(topic, color) {
  var body = document.getElementById('mBody');
  var qs = topic.quizzes;
  var sc = quizScores[topic.id] || {correct:0, total:0, passed:false};
  var pct = sc.total ? Math.round(sc.correct/sc.total*100) : 0;
  var done = isTopicDone(topic.id);

  var html = '<div class="quiz-score" id="qscore-' + topic.id + '">' +
    '<div class="qs-item"><div class="qs-val qs-ok">' + sc.correct + '</div><div class="qs-label">정답</div></div>' +
    '<div class="qs-item"><div class="qs-val qs-ng">' + (sc.total-sc.correct) + '</div><div class="qs-label">오답</div></div>' +
    '<div class="qs-item"><div class="qs-val qs-pct">' + pct + '%</div><div class="qs-label">정답률</div></div>' +
    '</div>';

  if (done) {
    html += '<div class="unlock-banner show"><h3>🎉 완료!</h3><p>이 항목을 마스터했습니다. 다음 항목이 잠금 해제되었습니다.</p></div>';
  }

  qs.forEach(function(q, qi) {
    var codeHTML = '';
    q.template.forEach(function(seg) {
      if (seg.t === 'code') {
        codeHTML += '<span>' + esc(seg.v) + '</span>';
      } else {
        codeHTML += '<input class="blank-inp" id="b_' + topic.id + '_' + qi + '_' + qi + '_' + seg.h.replace(/\s/g,'_') + '" data-answer="' + esc(seg.a) + '" size="' + seg.s + '" placeholder="?" autocomplete="off" spellcheck="false">';
      }
    });
    var answers = q.template.filter(function(s){ return s.t==='blank'; }).map(function(s){ return s.a; }).join(' | ');
    html += '<div class="quiz-item" id="qi_' + topic.id + '_' + qi + '">' +
      '<div class="q-prompt">Q' + (qi+1) + '. ' + q.prompt + '</div>' +
      '<div class="code-block" style="line-height:2">' + codeHTML + '</div>' +
      '<div class="q-actions">' +
        '<button class="btn btn-primary" id="checkbtn_' + topic.id + '_' + qi + '">채점</button>' +
        '<button class="btn" id="ansbtn_' + topic.id + '_' + qi + '">정답 보기</button>' +
        '<button class="btn" id="resetbtn_' + topic.id + '_' + qi + '">초기화</button>' +
      '</div>' +
      '<div class="answer-box" id="ans_' + topic.id + '_' + qi + '">' +
        '<div class="ans-label">ANSWER</div>' +
        '<div class="ans-val">' + esc(answers) + '</div>' +
        '<div class="ans-exp">' + q.explain + '</div>' +
      '</div>' +
    '</div>';
  });

  html += '<div class="threshold-note">🎯 70% 이상 정답 시 다음 항목이 잠금 해제됩니다</div>';
  body.innerHTML = html;

  // attach events
  qs.forEach(function(q, qi) {
    var btn = document.getElementById('checkbtn_' + topic.id + '_' + qi);
    if (btn) btn.onclick = (function(t,i,c){ return function(){ checkQ(t,i,c); }; })(topic, qi, color);
    var ans = document.getElementById('ansbtn_' + topic.id + '_' + qi);
    if (ans) ans.onclick = (function(tid,i){ return function(){ showAns(tid,i); }; })(topic.id, qi);
    var rst = document.getElementById('resetbtn_' + topic.id + '_' + qi);
    if (rst) rst.onclick = (function(t,i){ return function(){ resetQ(t,i); }; })(topic, qi);
  });
}

function checkQ(topic, qi, color) {
  var q = topic.quizzes[qi];
  var blanks = q.template.filter(function(s){ return s.t==='blank'; });
  var allOk = true;

  blanks.forEach(function(b) {
    var inputId = 'b_' + topic.id + '_' + qi + '_' + qi + '_' + b.h.replace(/\s/g,'_');
    var inp = document.getElementById(inputId);
    if (!inp) return;
    var val = inp.value.trim();
    var ok = val.toLowerCase() === b.a.toLowerCase();
    inp.classList.remove('ok','ng');
    inp.classList.add(ok ? 'ok' : 'ng');
    if (!ok) {
      allOk = false;
      if (!wrongNotes[topic.id]) wrongNotes[topic.id] = {};
      var nk = 'Q' + (qi+1) + '_' + b.h;
      if (!wrongNotes[topic.id][nk]) {
        wrongNotes[topic.id][nk] = {q:'Q'+(qi+1)+'. '+q.prompt, your:val||'(공백)', correct:b.a, count:0};
      } else {
        wrongNotes[topic.id][nk].your = val||'(공백)';
      }
      wrongNotes[topic.id][nk].count++;
    }
  });

  if (!quizScores[topic.id]) quizScores[topic.id] = {correct:0, total:0, passed:false};
  quizScores[topic.id].total++;
  if (allOk) quizScores[topic.id].correct++;

  var qiEl = document.getElementById('qi_' + topic.id + '_' + qi);
  if (qiEl) { qiEl.classList.remove('q-correct','q-wrong'); qiEl.classList.add(allOk ? 'q-correct' : 'q-wrong'); }
  if (!allOk) showAns(topic.id, qi);

  var sc = quizScores[topic.id];
  if (sc.correct/sc.total >= 0.7 && sc.total >= Math.min(2, topic.quizzes.length) && !sc.passed) {
    sc.passed = true;
    var st = getState(); st[topic.id] = true; setState(st);
    showToast('🎉 통과! 다음 항목이 잠금 해제되었습니다!');
    var mst = document.getElementById('mStatus');
    if (mst) { mst.textContent='✅ 완료!'; mst.className='completion-status done'; }
  }

  var sc2 = quizScores[topic.id];
  var p = sc2.total ? Math.round(sc2.correct/sc2.total*100) : 0;
  var scoreEl = document.getElementById('qscore-' + topic.id);
  if (scoreEl) {
    scoreEl.innerHTML =
      '<div class="qs-item"><div class="qs-val qs-ok">' + sc2.correct + '</div><div class="qs-label">정답</div></div>' +
      '<div class="qs-item"><div class="qs-val qs-ng">' + (sc2.total-sc2.correct) + '</div><div class="qs-label">오답</div></div>' +
      '<div class="qs-item"><div class="qs-val qs-pct">' + p + '%</div><div class="qs-label">정답률</div></div>';
  }
}

function showAns(tid, qi) {
  var box = document.getElementById('ans_' + tid + '_' + qi);
  if (box) box.classList.add('show');
}

function resetQ(topic, qi) {
  var q = topic.quizzes[qi];
  var blanks = q.template.filter(function(s){ return s.t==='blank'; });
  blanks.forEach(function(b){
    var inputId = 'b_' + topic.id + '_' + qi + '_' + qi + '_' + b.h.replace(/\s/g,'_');
    var inp = document.getElementById(inputId);
    if (inp) { inp.value=''; inp.classList.remove('ok','ng'); }
  });
  var qiEl = document.getElementById('qi_' + topic.id + '_' + qi);
  if (qiEl) qiEl.classList.remove('q-correct','q-wrong');
  var ans = document.getElementById('ans_' + topic.id + '_' + qi);
  if (ans) ans.classList.remove('show');
}

function prevTopic() {
  if (currentTopicIdx > 0) {
    var t = ALL_TOPICS[currentTopicIdx-1];
    var sec = SECTIONS.find(function(s){ return s.topics.includes(t); });
    currentTopicIdx--;
    renderModalContent(t, sec.color);
  }
}
function nextTopic() {
  if (currentTopicIdx < ALL_TOPICS.length-1) {
    if (!isTopicUnlocked(currentTopicIdx+1)) { showToast('🔒 현재 항목을 먼저 완료하세요 (퀴즈 70%)'); return; }
    var t = ALL_TOPICS[currentTopicIdx+1];
    var sec = SECTIONS.find(function(s){ return s.topics.includes(t); });
    currentTopicIdx++;
    renderModalContent(t, sec.color);
  }
}

// ============================================================
//  UTILS
// ============================================================
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
function fadeOut(e, href) {
  e.preventDefault();
  document.body.style.opacity = '0';
  document.body.style.transition = 'opacity .3s';
  setTimeout(function(){ window.location.href = href; }, 300);
}

// ============================================================
//  INIT
// ============================================================
document.body.style.opacity = '0';
document.body.style.transition = 'opacity .4s';
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });
renderMap();
requestAnimationFrame(function(){ document.body.style.opacity='1'; });

</script>
