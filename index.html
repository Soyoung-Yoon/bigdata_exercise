<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNN 대비 - PIL/Pillow 실기 암기 훈련</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #f78166;
    --accent3: #3fb950;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --code-bg: #0d1117;
    --yellow: #e3b341;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent3);
    background: rgba(63,185,80,0.1);
    border: 1px solid rgba(63,185,80,0.3);
    padding: 4px 8px;
    border-radius: 4px;
    letter-spacing: 2px;
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 9px 12px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 7px;
    transition: all .2s;
    font-weight: 400;
  }
  .tab-btn.active {
    background: var(--card);
    color: var(--text);
    font-weight: 700;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-bar-track {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent4));
    border-radius: 99px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .progress-stats { display: flex; gap: 16px; }
  .stat { text-align: center; }
  .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; }
  .stat-val.correct { color: var(--accent3); }
  .stat-val.wrong { color: var(--accent2); }
  .stat-val.total { color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* Flashcard */
  .flashcard-section { display: none; }
  .flashcard-section.active { display: block; }

  .flashcard-container {
    perspective: 1200px;
    margin: 0 auto 24px;
    cursor: pointer;
    height: 320px;
  }
  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
  }
  .flashcard-inner.flipped { transform: rotateY(180deg); }

  .flashcard-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px;
    gap: 16px;
    overflow: hidden;
  }
  .card-front {
    background: linear-gradient(135deg, var(--card) 0%, #1a2332 100%);
  }
  .card-back {
    background: linear-gradient(135deg, #0f1e12 0%, var(--card) 100%);
    transform: rotateY(180deg);
    align-items: flex-start;
  }

  .card-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
    position: absolute;
    top: 16px;
    left: 16px;
  }
  .tag-method { background: rgba(88,166,255,.15); color: var(--accent); border: 1px solid rgba(88,166,255,.3); }
  .tag-result { background: rgba(63,185,80,.15); color: var(--accent3); border: 1px solid rgba(63,185,80,.3); }

  .card-hint { position: absolute; bottom: 14px; font-size: 11px; color: var(--muted); }

  .method-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    line-height: 1.3;
  }
  .method-sub { font-size: 13px; color: var(--muted); text-align: center; }

  .back-title { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .back-desc { font-size: 15px; color: var(--text); font-weight: 500; line-height: 1.6; }

  .code-block {
    width: 100%;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--text);
    overflow-x: auto;
    white-space: pre;
  }
  .c-kw { color: #ff7b72; }
  .c-fn { color: #d2a8ff; }
  .c-str { color: #a5d6ff; }
  .c-num { color: #f2cc60; }
  .c-cm { color: #8b949e; font-style: italic; }
  .c-cls { color: #ffa657; }

  .cnn-note {
    width: 100%;
    background: rgba(210,168,255,0.06);
    border-left: 3px solid var(--accent4);
    border-radius: 0 6px 6px 0;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--accent4);
    line-height: 1.6;
  }

  .fc-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .fc-counter { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); }
  .btn {
    padding: 8px 20px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    font-weight: 500;
  }
  .btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 700; }
  .btn-primary:hover { background: #79b8ff; color: #0d1117; }
  .btn-danger { background: rgba(247,129,102,.15); color: var(--accent2); border-color: rgba(247,129,102,.3); }
  .btn-success { background: rgba(63,185,80,.15); color: var(--accent3); border-color: rgba(63,185,80,.3); }
  .shuffle-btn {
    font-size: 11px;
    padding: 6px 12px;
    background: rgba(88,166,255,.1);
    border-color: rgba(88,166,255,.3);
    color: var(--accent);
  }

  /* Quiz */
  .quiz-section { display: none; }
  .quiz-section.active { display: block; }

  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 20px;
    transition: border-color .2s;
  }
  .quiz-card.correct-card { border-color: var(--accent3); background: rgba(63,185,80,.04); }
  .quiz-card.wrong-card { border-color: var(--accent2); background: rgba(247,129,102,.04); }

  .quiz-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .q-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
  .q-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }

  .quiz-prompt {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 14px;
    line-height: 1.6;
  }

  .code-quiz {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 2;
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  .blank-input {
    display: inline-block;
    background: rgba(88,166,255,0.1);
    border: 1.5px solid var(--accent);
    border-radius: 5px;
    padding: 1px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 100px;
    outline: none;
    vertical-align: middle;
    transition: all .2s;
  }
  .blank-input:focus { background: rgba(88,166,255,.18); box-shadow: 0 0 0 2px rgba(88,166,255,.25); }
  .blank-input.correct { background: rgba(63,185,80,.15); border-color: var(--accent3); color: var(--accent3); }
  .blank-input.wrong { background: rgba(247,129,102,.15); border-color: var(--accent2); color: var(--accent2); }

  .answer-reveal {
    display: none;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent3);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 13px;
  }
  .answer-reveal.show { display: block; }
  .answer-reveal .label { font-size: 10px; color: var(--accent3); letter-spacing: 1px; margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
  .answer-reveal .ans { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent3); }
  .answer-reveal .explain { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.6; }

  .quiz-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  .result-banner {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 13px;
    font-weight: 600;
  }
  .result-banner.show { display: flex; }
  .result-banner.ok { color: var(--accent3); }
  .result-banner.ng { color: var(--accent2); }

  .quiz-controls {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  /* Cheatsheet */
  .sheet-section { display: none; }
  .sheet-section.active { display: block; }

  .method-grid { display: grid; gap: 12px; }
  .method-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
    align-items: start;
    transition: border-color .15s;
  }
  .method-row:hover { border-color: var(--accent); }
  .method-sig {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--accent);
    line-height: 1.6;
  }
  .method-sig .obj { color: var(--accent4); }
  .method-sig .arg { color: var(--yellow); }
  .method-info { }
  .method-info strong { font-size: 13px; color: var(--text); font-weight: 700; }
  .method-info p { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.6; }
  .method-info .param-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin: 3px 2px 0;
    background: rgba(227,179,65,.12);
    color: var(--yellow);
    border: 1px solid rgba(227,179,65,.3);
  }

  /* Wrongnote */
  .wrong-section { display: none; }
  .wrong-section.active { display: block; }
  .wrong-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .wrong-empty .icon { font-size: 36px; margin-bottom: 12px; }
  .wrong-note-item {
    background: var(--card);
    border: 1px solid rgba(247,129,102,.3);
    border-left: 3px solid var(--accent2);
    border-radius: 0 10px 10px 0;
    padding: 16px;
    margin-bottom: 10px;
  }
  .wn-q { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .wn-your { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent2); margin-bottom: 4px; }
  .wn-correct { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent3); }
  .wn-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; letter-spacing: 1px; }
  .wn-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent2); margin-top: 6px; }

  /* Misc */
  .section-title {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 600px) {
    .method-row { grid-template-columns: 1fr; }
    .method-sig { font-size: 11px; }
    .flashcard-container { height: 380px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="logo">PIL / PILLOW</div>
    </div>
    <div>
      <h1>이미지 메서드 실기 암기 훈련</h1>
      <p>CNN 전처리 기초 · 실기 시험 대비 · 완전 암기 목표</p>
    </div>
  </header>

  <div class="progress-bar-wrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-stats">
      <div class="stat"><div class="stat-val correct" id="statCorrect">0</div><div class="stat-label">정답</div></div>
      <div class="stat"><div class="stat-val wrong" id="statWrong">0</div><div class="stat-label">오답</div></div>
      <div class="stat"><div class="stat-val total" id="statTotal">0</div><div class="stat-label">시도</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('flash')">🃏 플래시카드</button>
    <button class="tab-btn" onclick="switchTab('quiz')">✏️ 빈칸 퀴즈</button>
    <button class="tab-btn" onclick="switchTab('sheet')">📋 치트시트</button>
    <button class="tab-btn" onclick="switchTab('wrong')">📝 오답노트</button>
  </div>

  <!-- ====== FLASHCARD ====== -->
  <div class="flashcard-section active" id="tab-flash">
    <div class="fc-nav">
      <span class="fc-counter" id="fcCounter">1 / 8</span>
      <div style="display:flex;gap:8px">
        <button class="btn shuffle-btn" onclick="shuffleCards()">🔀 셔플</button>
        <button class="btn" onclick="prevCard()">← 이전</button>
        <button class="btn" onclick="nextCard()">다음 →</button>
      </div>
    </div>

    <div class="flashcard-container" onclick="flipCard()">
      <div class="flashcard-inner" id="flashcardInner">
        <div class="flashcard-face card-front" id="cardFront">
          <span class="card-tag tag-method" id="cardTag">METHOD</span>
          <div class="method-name" id="cardMethodName">Image.open()</div>
          <div class="method-sub" id="cardSub">PIL.Image 모듈</div>
          <span class="card-hint">클릭하여 뒤집기</span>
        </div>
        <div class="flashcard-face card-back" id="cardBack">
          <span class="card-tag tag-result">RESULT</span>
          <div class="back-title">📌 설명</div>
          <div class="back-desc" id="cardDesc"></div>
          <div class="code-block" id="cardCode"></div>
          <div class="cnn-note" id="cardCnn"></div>
        </div>
      </div>
    </div>

    <div style="text-align:center;margin-top:8px">
      <button class="btn btn-success" onclick="markKnown()" style="margin-right:8px">✅ 알겠어!</button>
      <button class="btn btn-danger" onclick="markUnknown()">❌ 다시 볼게</button>
    </div>
  </div>

  <!-- ====== QUIZ ====== -->
  <div class="quiz-section" id="tab-quiz">
    <div class="quiz-controls">
      <p class="section-title">빈칸 채우기 퀴즈 — 랜덤 출제</p>
      <div style="display:flex;gap:8px">
        <button class="btn shuffle-btn" onclick="initQuiz()">🔀 새 문제 세트</button>
        <button class="btn btn-primary" onclick="checkAll()">전체 채점</button>
      </div>
    </div>
    <div id="quizContainer"></div>
  </div>

  <!-- ====== CHEATSHEET ====== -->
  <div class="sheet-section" id="tab-sheet">
    <p class="section-title">PIL/Pillow 메서드 전체 요약</p>
    <div class="method-grid" id="sheetGrid"></div>
  </div>

  <!-- ====== WRONG NOTE ====== -->
  <div class="wrong-section" id="tab-wrong">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <p class="section-title">오답 노트</p>
      <button class="btn btn-danger" style="font-size:11px;padding:5px 10px" onclick="clearWrong()">초기화</button>
    </div>
    <div id="wrongContainer"></div>
  </div>

</div>

<script>
// ============================================================
// DATA
// ============================================================
const METHODS = [
  {
    id: 'open',
    name: 'Image.open(path)',
    sub: 'PIL.Image 모듈',
    desc: '지정한 경로의 이미지 파일을 열어 PIL Image 객체로 반환합니다. JPEG, PNG, BMP 등 다양한 형식을 지원합니다.',
    params: ['path: str — 이미지 파일 경로'],
    returns: 'PIL.Image.Image 객체',
    code: `<span class="c-kw">from</span> PIL <span class="c-kw">import</span> <span class="c-cls">Image</span>

img = <span class="c-cls">Image</span>.<span class="c-fn">open</span>(<span class="c-str">"daisy.jpg"</span>)
<span class="c-kw">print</span>(img.size)   <span class="c-cm"># (width, height) 확인</span>
<span class="c-kw">print</span>(img.mode)   <span class="c-cm"># 'RGB', 'L' 등</span>`,
    cnn: '🧠 CNN 입력 전 가장 먼저 호출. img.size로 원본 크기를 확인합니다.'
  },
  {
    id: 'show',
    name: 'img.show()',
    sub: 'PIL Image 인스턴스 메서드',
    desc: '이미지를 OS 기본 이미지 뷰어로 즉시 열어 확인합니다. Jupyter에서는 plt.imshow()를 더 많이 사용합니다.',
    params: [],
    returns: 'None',
    code: `img = <span class="c-cls">Image</span>.<span class="c-fn">open</span>(<span class="c-str">"daisy.jpg"</span>)
img.<span class="c-fn">show</span>()  <span class="c-cm"># 기본 뷰어로 열기</span>

<span class="c-cm"># Jupyter에서는 matplotlib 사용 권장</span>
<span class="c-kw">import</span> matplotlib.pyplot <span class="c-kw">as</span> plt
plt.<span class="c-fn">imshow</span>(img)
plt.<span class="c-fn">show</span>()`,
    cnn: '🧠 전처리 전/후 이미지 상태를 빠르게 육안 확인할 때 사용합니다.'
  },
  {
    id: 'save',
    name: 'img.save(path)',
    sub: 'PIL Image 인스턴스 메서드',
    desc: '이미지를 지정한 경로에 저장합니다. 확장자에 따라 형식이 자동으로 결정됩니다 (.jpg → JPEG, .png → PNG).',
    params: ['path: str — 저장 경로 (확장자 포함)'],
    returns: 'None',
    code: `img.<span class="c-fn">save</span>(<span class="c-str">"output.jpg"</span>)   <span class="c-cm"># JPEG 저장</span>
img.<span class="c-fn">save</span>(<span class="c-str">"output.png"</span>)   <span class="c-cm"># PNG 저장</span>

<span class="c-cm"># 품질 옵션 (JPEG 전용)</span>
img.<span class="c-fn">save</span>(<span class="c-str">"out.jpg"</span>, quality=<span class="c-num">95</span>)`,

// ============================================================
// STATE
// ============================================================
let cardIndex = 0;
let cardOrder = METHODS.map((_, i) => i);
let isFlipped = false;
let stats = { correct: 0, wrong: 0, total: 0 };
let wrongNotes = {}; // key: quizId_blankKey → { q, your, correct, count }
let quizState = []; // shuffled quiz order

// ============================================================
// UTILS
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateStats() {
  document.getElementById('statCorrect').textContent = stats.correct;
  document.getElementById('statWrong').textContent = stats.wrong;
  document.getElementById('statTotal').textContent = stats.total;
  const pct = stats.total === 0 ? 0 : Math.round((stats.correct / stats.total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

// ============================================================
// TABS
// ============================================================
function switchTab(name) {
  ['flash','quiz','sheet','wrong'].forEach(t => {
    document.getElementById('tab-' + t).classList.remove('active');
    document.getElementById('tab-' + t).style.display = 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.remove('active'));
  const map = { flash: 0, quiz: 1, sheet: 2, wrong: 3 };
  document.querySelectorAll('.tab-btn')[map[name]].classList.add('active');

  const el = document.getElementById('tab-' + name);
  el.style.display = 'block';
  el.classList.add('active');

  if (name === 'wrong') renderWrongNotes();
}

// ============================================================
// FLASHCARD
// ============================================================
function renderCard() {
  const m = METHODS[cardOrder[cardIndex]];
  isFlipped = false;
  document.getElementById('flashcardInner').classList.remove('flipped');

  document.getElementById('cardMethodName').textContent = m.name;
  document.getElementById('cardSub').textContent = m.sub;
  document.getElementById('cardDesc').textContent = m.desc;
  document.getElementById('cardCode').innerHTML = m.code;
  document.getElementById('cardCnn').textContent = m.cnn;
  document.getElementById('fcCounter').textContent = `${cardIndex + 1} / ${METHODS.length}`;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcardInner').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  cardIndex = (cardIndex + 1) % METHODS.length;
  renderCard();
}

function prevCard() {
  cardIndex = (cardIndex - 1 + METHODS.length) % METHODS.length;
  renderCard();
}

function shuffleCards() {
  cardOrder = shuffle(cardOrder);
  cardIndex = 0;
  renderCard();
}

function markKnown() {
  stats.correct++;
  stats.total++;
  updateStats();
  nextCard();
}

function markUnknown() {
  stats.wrong++;
  stats.total++;
  updateStats();
  // Add to wrong notes
  const m = METHODS[cardOrder[cardIndex]];
  const key = 'fc_' + m.id;
  if (!wrongNotes[key]) wrongNotes[key] = { q: '플래시카드: ' + m.name, your: '(모름)', correct: m.desc.slice(0, 50) + '...', count: 0 };
  wrongNotes[key].count++;
  nextCard();
}

// ============================================================
// QUIZ
// ============================================================
function initQuiz() {
  quizState = shuffle(QUIZZES);
  renderQuizzes();
}

function renderQuizzes() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';

  quizState.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'quiz-card';
    div.id = 'qcard-' + q.id;

    let codeHTML = '';
    q.template.forEach(seg => {
      if (seg.type === 'code') {
        codeHTML += `<span style="color:var(--text)">${escapeHtml(seg.text)}</span>`;
      } else {
        codeHTML += `<input class="blank-input" id="${q.id}_${seg.key}" data-answer="${seg.answer}" data-qid="${q.id}" data-key="${seg.key}" size="${seg.size}" placeholder="?" autocomplete="off" spellcheck="false">`;
      }
    });

    div.innerHTML = `
      <div class="quiz-meta">
        <span class="q-num">Q${qi + 1}</span>
        <span class="q-tag" style="background:rgba(88,166,255,.1);color:var(--accent);border:1px solid rgba(88,166,255,.3)">${q.tag}</span>
      </div>
      <div class="quiz-prompt">${q.prompt}</div>
      <div class="code-quiz">${codeHTML}</div>
      <div class="quiz-actions">
        <button class="btn btn-primary" style="font-size:12px;padding:6px 14px" onclick="checkSingle('${q.id}')">채점</button>
        <button class="btn" style="font-size:12px;padding:6px 14px" onclick="showAnswer('${q.id}')">정답 보기</button>
        <button class="btn" style="font-size:12px;padding:6px 14px" onclick="resetSingle('${q.id}')">초기화</button>
      </div>
      <div class="answer-reveal" id="ans-${q.id}">
        <div class="label">✅ 정답 & 해설</div>
        <div class="ans" id="ans-correct-${q.id}"></div>
        <div class="explain">${q.explain}</div>
      </div>
      <div class="result-banner" id="result-${q.id}"></div>
    `;
    container.appendChild(div);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function checkSingle(qid) {
  const q = QUIZZES.find(x => x.id === qid);
  const blanks = q.template.filter(s => s.type === 'blank');
  let allCorrect = true;

  blanks.forEach(b => {
    const input = document.getElementById(`${qid}_${b.key}`);
    const val = input.value.trim();
    const ok = val.toLowerCase() === b.answer.toLowerCase();
    input.classList.remove('correct', 'wrong');
    input.classList.add(ok ? 'correct' : 'wrong');

    stats.total++;
    if (ok) {
      stats.correct++;
    } else {
      stats.wrong++;
      allCorrect = false;
      // Wrong note
      const noteKey = `${qid}_${b.key}`;
      if (!wrongNotes[noteKey]) wrongNotes[noteKey] = { q: q.prompt + ' [' + b.key + ']', your: val || '(공백)', correct: b.answer, count: 0 };
      else wrongNotes[noteKey].your = val || '(공백)';
      wrongNotes[noteKey].count++;
    }
  });

  updateStats();

  const card = document.getElementById('qcard-' + qid);
  card.classList.remove('correct-card', 'wrong-card');
  card.classList.add(allCorrect ? 'correct-card' : 'wrong-card');

  const rb = document.getElementById('result-' + qid);
  rb.className = 'result-banner show ' + (allCorrect ? 'ok' : 'ng');
  rb.textContent = allCorrect ? '✅ 완벽합니다!' : '❌ 오답이 있습니다. 정답을 확인하세요.';

  if (!allCorrect) showAnswer(qid);
}

function showAnswer(qid) {
  const q = QUIZZES.find(x => x.id === qid);
  const blanks = q.template.filter(s => s.type === 'blank');
  const ansDiv = document.getElementById('ans-' + qid);
  const ansCorrect = document.getElementById('ans-correct-' + qid);
  ansDiv.classList.add('show');
  ansCorrect.textContent = blanks.map(b => `${b.key}: ${b.answer}`).join('  |  ');
}

function resetSingle(qid) {
  const q = QUIZZES.find(x => x.id === qid);
  const blanks = q.template.filter(s => s.type === 'blank');
  blanks.forEach(b => {
    const input = document.getElementById(`${qid}_${b.key}`);
    input.value = '';
    input.classList.remove('correct', 'wrong');
  });
  const card = document.getElementById('qcard-' + qid);
  card.classList.remove('correct-card', 'wrong-card');
  document.getElementById('ans-' + qid).classList.remove('show');
  document.getElementById('result-' + qid).classList.remove('show');
}

function checkAll() {
  quizState.forEach(q => checkSingle(q.id));
}

// ============================================================
// CHEATSHEET
// ============================================================
function renderSheet() {
  const grid = document.getElementById('sheetGrid');
  grid.innerHTML = '';
  METHODS.forEach(m => {
    const paramHTML = m.params.map(p => `<span class="param-tag">${p}</span>`).join('');
    grid.innerHTML += `
      <div class="method-row">
        <div>
          <div class="method-sig"><span class="obj">Image/img</span>.${m.name.split('.').pop()}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace">→ ${m.returns}</div>
          <div style="margin-top:6px">${paramHTML}</div>
        </div>
        <div class="method-info">
          <strong>${m.name}</strong>
          <p>${m.desc}</p>
          <p style="margin-top:6px;color:var(--accent4);font-size:11px">${m.cnn}</p>
        </div>
      </div>
    `;
  });
}

// ============================================================
// WRONG NOTES
// ============================================================
function renderWrongNotes() {
  const container = document.getElementById('wrongContainer');
  const keys = Object.keys(wrongNotes);
  if (keys.length === 0) {
    container.innerHTML = `
      <div class="wrong-empty">
        <div class="icon">🎉</div>
        <div>오답 기록이 없습니다!</div>
        <div style="margin-top:6px;font-size:12px">퀴즈를 풀면 틀린 항목이 여기 모입니다.</div>
      </div>
    `;
    return;
  }
  container.innerHTML = '';
  keys.sort((a, b) => wrongNotes[b].count - wrongNotes[a].count).forEach(k => {
    const n = wrongNotes[k];
    container.innerHTML += `
      <div class="wrong-note-item">
        <div class="wn-q">${n.q}</div>
        <div class="wn-label">내 답</div>
        <div class="wn-your">${n.your}</div>
        <div class="wn-label">정답</div>
        <div class="wn-correct">${n.correct}</div>
        <div class="wn-count">틀린 횟수: ${n.count}회</div>
      </div>
    `;
  });
}

function clearWrong() {
  wrongNotes = {};
  renderWrongNotes();
}

// ============================================================
// INIT
// ============================================================
// Fix tab display
document.querySelectorAll('.flashcard-section,.quiz-section,.sheet-section,.wrong-section').forEach(el => {
  el.style.display = 'none';
});
document.getElementById('tab-flash').style.display = 'block';

renderCard();
renderSheet();
initQuiz();
</script>
